<!DOCTYPE html>
<html>
<head>
    <title>DFL Clinic (Node {{ NODE_ID }})</title>
</head>
<body style="font-family: sans-serif; max-width: 600px; margin: 40px auto;">
    <h2>Symptoms Analysis (Node {{ NODE_ID }})</h2>
    <textarea id="symptoms" rows="4" style="width: 100%;" placeholder="Enter patient symptoms..."></textarea><br><br>
    <button onclick="predict()">Get Diagnosis</button>
    <div id="result" style="margin-top: 20px; white-space: pre-wrap; background: #f4f4f4; padding: 10px; border-radius: 5px; display: none;"></div>
    
    <script>
        async function predict() {
            const btn = document.querySelector('button');
            const res = document.getElementById('result');
            res.style.display = 'block';
            res.innerText = 'Analyzing...';
            btn.disabled = true;
            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({symptoms: document.getElementById('symptoms').value})
                });
                const data = await response.json();
                res.innerText = data.diagnosis || data.error || 'Unknown error';
            } catch (e) {
                res.innerText = 'Error: ' + e;
            }
            btn.disabled = false;
        }
    </script>
</body>
</html>
